<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dice Lab</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script type="module">
  import { DiceLab } from './src/trivia/dice-lab/DiceLab.js';

  const app = document.getElementById('app');
  try {
    DiceLab({ mount: app });
  } catch (err) {
    app.innerHTML = '<pre style="color:red;white-space:pre-wrap">' + (err && err.stack ? err.stack : err) + '</pre>';
  }
</script>

</body>
</html>
