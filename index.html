<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Explorá Impacto Ambiental | Lluvia de Ideas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.onerror = function (msg, url, line, col, error) {
        document.body.innerHTML = "<pre style='color:red'>" +
          msg + "\n" +
          url + ":" + line + ":" + col +
          "\n" + (error && error.stack) +
        "</pre>";
      };
    </script>
    <script type="module">
      import { TriviaApp } from './src/trivia/TriviaApp.js';
      try {
        TriviaApp(document.getElementById('app'));
      } catch (e) {
        document.body.innerHTML = "<pre style='color:red'>" + e.stack + "</pre>";
      }
    </script>
  </body>
</html>
